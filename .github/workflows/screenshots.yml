name: Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/app/**/*.tsx"
      - "src/components/**/*.tsx"
      - "src/app/**/page.tsx"
      - "src/components/ui/**/*.tsx"

env:
  DATABASE_URL: "file:./dev.db"
  JWT_SECRET: "ci-test-secret-key-32chars-minimum"
  NEXT_PUBLIC_RPC_URL: "https://api.mainnet-beta.solana.com"
  NEXT_PUBLIC_API_URL: "http://localhost:3000/api"
  NEXT_PUBLIC_ENV: "ci"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

jobs:
  screenshots:
    name: Capture UI Screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Prisma generate
        run: npx prisma generate || echo "Prisma generate skipped"

      - name: Build
        run: npm run build || echo "Build failed"
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium || echo "Playwright install failed"

      - name: Start app
        run: |
          npm start &
          sleep 10
        env:
          PORT: 3000
          NODE_ENV: production

      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 60000 || echo "App not ready"

      - name: Ensure screenshots directory exists
        run: mkdir -p docs/assets/ui

      - name: Capture dashboards
        run: |
          npx playwright screenshot --viewport-size=1920,1080 --full-page \
            "http://localhost:3000/dashboard" \
            docs/assets/ui/user-dashboard.png || echo "User dashboard capture failed"
          
          npx playwright screenshot --viewport-size=1920,1080 --full-page \
            "http://localhost:3000/admin" \
            docs/assets/ui/admin-dashboard.png || echo "Admin dashboard capture failed"
          
          npx playwright screenshot --viewport-size=1920,1080 --full-page \
            "http://localhost:3000/developer" \
            docs/assets/ui/dev-dashboard.png || echo "Developer dashboard capture failed"

      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update UI screenshots [skip ci]"
          file_pattern: docs/assets/ui/*.png
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"